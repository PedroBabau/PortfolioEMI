<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CyberPortfolio | Projetos em Pares</title>
    <!-- Google Fonts: Fonte futurista e mono -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (ícones) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            color: #0ff;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        /* Efeito de scanline e ruído */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 255, 0.03) 0px, rgba(0, 255, 255, 0.03) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 1;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0, 255, 255, 0.02) 90%);
            pointer-events: none;
            z-index: 1;
        }

        /* Container principal */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            position: relative;
            z-index: 2;
        }

        /* Header com neon glitch */
        .glitch-header {
            text-align: center;
            margin-bottom: 3.5rem;
            border-bottom: 2px solid #0ff;
            padding-bottom: 1.5rem;
            box-shadow: 0 10px 20px -10px rgba(0, 255, 255, 0.2);
        }

        .glitch {
            font-size: 3.5rem;
            font-weight: 800;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255, 0, 255, 0.7), -0.05em -0.025em 0 rgba(0, 255, 255, 0.7);
            animation: glitch-shake 0.3s infinite alternate;
            letter-spacing: 4px;
        }

        @keyframes glitch-shake {
            0% { transform: translate(0); }
            100% { transform: translate(-1px, 1px); }
        }

        .sub {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            color: #8cf;
            letter-spacing: 2px;
            margin-top: 10px;
            border-left: 3px solid #0ff;
            padding-left: 12px;
            display: inline-block;
        }

        /* Grid de pares (cada card duplo) */
        .pairs-grid {
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        /* Cada par (dupla de projetos) */
        .pair-card {
            background: rgba(10, 20, 35, 0.6);
            backdrop-filter: blur(8px);
            border: 1.5px solid #0ff;
            border-radius: 32px;
            padding: 1.8rem 1.5rem;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3), inset 0 0 10px rgba(0, 255, 255, 0.05);
            transition: 0.25s ease;
        }

        .pair-card:hover {
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
            border-color: #f0f;
            transform: translateY(-3px);
        }

        /* Cabeçalho do par com ícone e botão repo do par */
        .pair-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.8rem;
            border-bottom: 1px dashed #0ff;
            padding-bottom: 0.8rem;
        }

        .pair-title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0ff, #f0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pair-title i {
            font-size: 2rem;
            color: #0ff;
            text-shadow: 0 0 5px #0ff;
        }

        .btn-repo-pair {
            background: transparent;
            border: 2px solid #0ff;
            color: #0ff;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(4px);
        }

        .btn-repo-pair i {
            font-size: 1.2rem;
        }

        .btn-repo-pair:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 15px #0ff;
            border-color: #0ff;
            transform: scale(1.02);
        }

        /* Container dos dois projetos lado a lado */
        .two-projects {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
        }

        /* Cada projeto individual */
        .project-card {
            flex: 1;
            min-width: 240px;
            background: rgba(0, 0, 0, 0.65);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid #2af;
            transition: 0.2s;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.4);
        }

        .project-card:hover {
            border-color: #f0f;
            background: rgba(0, 20, 40, 0.8);
        }

        .project-number {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            color: #ff66cc;
            letter-spacing: 1px;
            background: rgba(255, 0, 255, 0.2);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 12px;
        }

        .project-name {
            font-size: 1.6rem;
            font-weight: 700;
            word-break: break-word;
            margin-bottom: 1rem;
            text-shadow: 0 0 3px cyan;
        }

        .project-desc {
            font-family: 'Share Tech Mono', monospace;
            color: #bdf;
            font-size: 0.85rem;
            margin-bottom: 1.8rem;
            line-height: 1.4;
            min-height: 65px;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn-project {
            background: transparent;
            border: 1.5px solid #0ff;
            color: #0ff;
            padding: 8px 16px;
            border-radius: 30px;
            font-family: 'Orbitron', monospace;
            font-weight: 500;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-project i {
            font-size: 0.9rem;
        }

        .btn-project:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 10px #0ff;
        }

        /* rodapé neon */
        .footer-neon {
            margin-top: 4rem;
            text-align: center;
            font-size: 0.8rem;
            color: #5cf;
            border-top: 1px solid #0ff3;
            padding-top: 1.8rem;
            font-family: monospace;
        }

        /* responsividade */
        @media (max-width: 780px) {
            .glitch { font-size: 2.2rem; }
            .pair-title { font-size: 1.4rem; }
            .project-name { font-size: 1.3rem; }
            .container { padding: 1rem; }
            .btn-repo-pair { padding: 6px 14px; font-size: 0.75rem; }
        }

        /* pequenos detalhes cyberpunk */
        .corner-glow {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(0,255,255,0.2) 0%, rgba(0,0,0,0) 80%);
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>
<div class="corner-glow"></div>
<div class="container">
    <div class="glitch-header">
        <div class="glitch">PORTFOLIO EMI</div>
        <div class="sub">&gt; 8 PROJETOS • 4 REPOSITÓRIOS PARES &lt;</div>
    </div>

    <div class="pairs-grid" id="pairsContainer">
        <!-- Os pares serão injetados via JS para fácil manutenção, mas com estrutura HTML semântica -->
    </div>
    <div class="footer-neon">
        <i class="fas fa-code-branch"></i> Projetos desenvolvidos no âmbito da Unidade Curricular Edições de Multimédia Interativas
    </div>
</div>

<script>    
    const portfolioData = [
        {
            pairId: 1,
            pairName: "Coding Interativo",
            repoUrl: "https://github.com/PedroBabau/Coding_Interativo",   // SUBSTITUIR PELO REPO REAL
            projetos: [
                {
                    nome: "Particle Storm",
                    descricao: "Efeitos de criação e manipulação de partículas",
                    projectPageUrl: "https://pedrobabau.github.io/projeto1/index.html"
                },
                {
                    nome: "Sound Painter",
                    descricao: "Pintar visualmente utilizando input de áudio (microfone ou ficheiros).",
                    projectPageUrl: "https://pedrobabau.github.io/projeto2/index.html"
                }
            ]
        },
        {
            pairId: 2,
            pairName: "Experiências 3D",
            repoUrl: "https://github.com/PedroBabau/Projeto_2_Experiencias_3D_Interativas_Unity",
            projetos: [
                {
                    nome: "Visualizador Orbital 3D",
                    descricao: "Observa a mudança de perspetiva para com uma nave",
                    projectPageUrl: "https://pedrobpinheiro.itch.io/projeto-a-visualizador-orbital-3d"
                },
                {
                    nome: "Realizador de Cinema",
                    descricao: "Explora várias perspetivas de câmera numa cena de dança",
                    projectPageUrl: "https://pedrobpinheiro.itch.io/projeto-b-realizador-de-cinema"
                }
            ]
        },
        {
            pairId: 3,
            pairName: "Dashboards",
            repoUrl: "https://github.com/PedroBabau/MyDashboards/tree/main",
            projetos: [
                {
                    nome: "GeoPulse",
                    descricao: "Scanner de portas com interface gráfica futurista e análise de vulnerabilidades.",
                    projectPageUrl: "https://pedrobabau.github.io/MyDashboards/dashboard1/"
                },
                {
                    nome: "API Explorer",
                    descricao: "Ferramenta de análise de sinais RFID para estudos de segurança.",
                    projectPageUrl: "https://pedrobabau.github.io/MyDashboards/dashboard2/"
                }
            ]
        },
        {
            pairId: 4,
            pairName: "AR & VR",
            repoUrl: "https://pedrobabau.github.io/ProjetoARVR/",
            projetos: [
                {
                    nome: "AR Animal Care",
                    descricao: "Toma conta de animais virtuais com Realidade Aumentada",
                    projectPageUrl: "https://pedrobabau.github.io/ProjetoARVR/AR/index.html"
                },
                {
                    nome: "VR Gundam Hangar",
                    descricao: "Explora o mundo com o teu RX-78-2",
                    projectPageUrl: "https://pedrobabau.github.io/ProjetoARVR/VR/index.html"
                }
            ]
        }
    ];

    // Função para abrir URL com segurança (target blank)
    function openLink(url, labelForError = "repositório") {
        if (!url || url === "#" || url === "") {
            alert(`⚠️ Link do ${labelForError} não configurado. Substitua pelos URLs reais no código JavaScript.`);
            return;
        }
        window.open(url, "_blank", "noopener,noreferrer");
    }

    // Gerar o HTML dinamicamente (cyberpunk vibe)
    function buildPortfolio() {
        const container = document.getElementById("pairsContainer");
        if (!container) return;

        let html = "";
        portfolioData.forEach((pair, idx) => {
            // Ícone aleatório mas único por par
            const iconsPair = ["🧬", "⚡", "🔮", "🕹️"];
            const pairIcon = iconsPair[idx % iconsPair.length];
            
            html += `
                <div class="pair-card" data-pair-id="${pair.pairId}">
                    <div class="pair-header">
                        <div class="pair-title">
                            <i class="fas fa-bolt"></i> 
                            ${escapeHtml(pair.pairName)} 
                            <span style="font-size: 1rem;">${pairIcon}</span>
                        </div>
                        <button class="btn-repo-pair" data-repo-url="${escapeHtml(pair.repoUrl)}" data-pair-index="${idx}">
                            <i class="fab fa-github"></i> REPOSITÓRIO
                        </button>
                    </div>
                    <div class="two-projects">
            `;
            
            // Percorrer os 2 projetos do par
            pair.projetos.forEach((proj, projIndex) => {
                const projectNumber = projIndex + 1;
                html += `
                    <div class="project-card">
                        <div class="project-number">
                            <i class="fas fa-microchip"></i> PROJETO #${projectNumber}
                        </div>
                        <div class="project-name">${escapeHtml(proj.nome)}</div>
                        <div class="project-desc">${escapeHtml(proj.descricao)}</div>
                        <div class="button-group">
                            <button class="btn-project project-page-btn" data-project-url="${escapeHtml(proj.projectPageUrl)}" data-pair="${pair.pairId}" data-proj-name="${escapeHtml(proj.nome)}">
                                <i class="fas fa-external-link-alt"></i> PÁGINA DO PROJETO
                            </button>
                        </div>
                    </div>
                `;
            });
            
            html += `
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
        
        // Após injetar, adicionar os event listeners para todos os botões:
        // 1. Botões de repositório do par
        const repoPairBtns = document.querySelectorAll(".btn-repo-pair");
        repoPairBtns.forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const repoUrl = btn.getAttribute("data-repo-url");
                if (repoUrl && repoUrl !== "#") {
                    openLink(repoUrl, "repositório do par");
                } else {
                    alert("🔗 URL do repositório deste par não foi definida. Edite o array portfolioData com o link real do GitHub.");
                }
            });
        });
        
        // 2. Botões de cada projeto (página do projeto no GitHub)
        const projectPageBtns = document.querySelectorAll(".project-page-btn");
        projectPageBtns.forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const projectUrl = btn.getAttribute("data-project-url");
                const projectName = btn.getAttribute("data-proj-name") || "projeto";
                if (projectUrl && projectUrl !== "#" && projectUrl !== "") {
                    openLink(projectUrl, `página do projeto ${projectName}`);
                } else {
                    alert(`⚠️ Link da página do projeto "${projectName}" não configurado. Edite o portfolioData com a URL correta.`);
                }
            });
        });
    }
    
    // Função auxiliar para evitar XSS (escape)
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    // Carregar e também caso queira incluir um exemplo de fallback para links não configurados
    window.addEventListener("DOMContentLoaded", () => {
        buildPortfolio();
        
        // Adicionar efeito de console cyberpunk
        console.log("%c⚡ CYBERPORTFOLIO CARREGADO | 8 PROJETOS | 4 PARES", "color: #0ff; font-size: 16px; font-family: monospace;");
        console.log("%cCertifique-se de trocar os URLs de exemplo pelos links reais do GitHub.", "color: #fa0; font-size: 12px;");
        
        // Pequeno aviso flutuante para desenvolvedor (suave)
        const devNote = document.createElement('div');
        devNote.style.position = 'fixed';
        devNote.style.bottom = '10px';
        devNote.style.left = '10px';
        devNote.style.backgroundColor = 'rgba(0,0,0,0.7)';
        devNote.style.color = '#0ff';
        devNote.style.fontSize = '10px';
        devNote.style.padding = '4px 12px';
        devNote.style.borderRadius = '20px';
        devNote.style.fontFamily = 'monospace';
        devNote.style.border = '1px solid #0ff';
        devNote.style.zIndex = '999';
        setTimeout(() => {
            devNote.style.opacity = '0.6';
        }, 3000);
    });
</script>
</body>
</html>
